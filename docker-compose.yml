services:
  qdrant:
    image: qdrant/qdrant:v1.12.4
    container_name: aneel-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"   # HTTP REST
      - "6334:6334"   # gRPC
    volumes:
      - qdrant_storage:/qdrant/storage
    environment:
      QDRANT__LOG_LEVEL: INFO

volumes:
  qdrant_storage:
